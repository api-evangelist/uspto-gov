name: uspto-tsdr-status
title: USPTO TSDR Status
description: |
  Naftiko capability for retrieving U.S. trademark case status by serial number, registration number,
  reference number, or international registration number via the USPTO Trademark Status & Document
  Retrieval (TSDR) API.
api: uspto-gov:uspto-tsdr-api
auth:
  type: api-key
  header: USPTO-API-KEY
  envVar: USPTO_TSDR_API_KEY
rateLimit:
  requests: 60
  window: 1m
endpoints:
- getCaseStatusBySerialNumberXml
- getCaseStatusBySerialNumberJson
- getCaseStatusBySerialNumberSt96
- getCaseStatusByRegistrationNumberXml
- getCaseStatusByRegistrationNumberJson
- getCaseStatusByReferenceNumberXml
- getCaseStatusByIrNumberXml
