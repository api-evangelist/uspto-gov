name: uspto-patent-file-wrapper
title: USPTO Patent File Wrapper
description: |
  Naftiko capability for searching and retrieving U.S. patent application file wrappers — including
  bibliographic data, prosecution documents, assignments, continuity, foreign priority, and patent
  term adjustment — via the USPTO Open Data Portal Patent File Wrapper API.
api: uspto-gov:uspto-patent-file-wrapper-api
auth:
  type: api-key
  header: X-API-KEY
  envVar: USPTO_ODP_API_KEY
endpoints:
- searchPatentApplications
- searchPatentApplicationsPost
- getPatentApplication
- getPatentApplicationMetadata
- getPatentTermAdjustment
- getPatentAssignments
- getApplicationAttorney
- getApplicationContinuity
- getApplicationForeignPriority
- getApplicationTransactions
- listApplicationDocuments
- downloadApplicationDocumentPdf
